---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
name: core-hyprland
description: Silverblue NVIDIA image with danklinux-style hyprland desktop.

base-image: ghcr.io/ublue-os/base-nvidia
image-version: 43

modules:
  - type: files
    files:
      - source: system
        destination: /

  - type: dnf
    repos:
      copr:
        - ririko66z/dots-hyprland
        - sdegler/hyprland
        - deltacopy/darkly
        - alternateved/eza
        - atim/starship
        - avengemedia/dms
    install:
      packages:
        - bc
        - bibata-cursor-theme
        - bluedevil
        - breakpad
        - breeze-cursor-theme
        - breeze-icon-theme
        - breeze-icon-theme-fedora
