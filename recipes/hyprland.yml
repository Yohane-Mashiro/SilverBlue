        - ripgrep
        - rsync
        - sddm-breeze
        - slurp
        - songrec
        - starship
        - swappy
        - tesseract
        - tesseract-langpack-chi_sim
        - tesseract-langpack-eng
        - translate-shell
        - twitter-twemoji-fonts
        - unzip
        - upower
        - uv
        - wayland-devel
        - wf-recorder
        - wget2
