        - clang
        - cliphist
        - cmake
        - coreutils
        - curl
        - darkly
        - ddcutil
        - dolphin
        - dms
        - eza
        - git
        - fish
        - fastfetch
        - florian-karsten-space-grotesk-fonts
        - fuzzel
        - geoclue2
        - glib2
        - gnome-keyring
        - gnome-terminal
        - gobject-introspection-devel
        - google-material-symbols-vf-rounded-fonts
        - google-rubik-vf-fonts
        - google-sans-flex-vf-fonts
        - grub2-breeze-theme
        - gtk4-devel
        - hypridle
        - hyprland
        - hyprland-guiutils
        - hyprlock
        - hyprpicker
        - hyprshot
        - hyprsunset
        - ImageMagick
        - jemalloc
        - jetbrains-mono-nerd-fonts
        - jq
        - kdialog
        - kf6-breeze-icons
        - kf6-kirigami
        - kf6-syntax-highlighting
        - kitty
        - libadwaita-devel
        - libdbusmenu-gtk3-devel
        - libdrm
        - libportal-gtk4
        - libsoup3-devel
        - libxcb
        - material-icons-fonts
        - matugen
        - microtex
        - mpvpaper
        - NetworkManager
        - pavucontrol
        - pipewire-libs
        - playerctl
        - plasma-nm
        - plasma-systemmonitor
        - plasma-systemsettings
        - polkit-kde
        - python3
        - python3.12
        - python3-devel
        - python3.12-devel
        - qalculate
        - qt5-qtwayland
        - qt6-qt5compat
        - qt6-qtbase
        - qt6-qtdeclarative
